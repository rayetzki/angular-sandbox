<ul class="filter" role="tablist">
  <li class="filter__item" tabindex="0" role="tab" (click)="changeFilter('All')" [attr.aria-current]="activeFilter === 'All'">All</li>
  <li class="filter__item" tabindex="0" role="tab" (click)="changeFilter('Done')" [attr.aria-current]="activeFilter === 'Done'">Done</li>
  <li class="filter__item" tabindex="0" role="tab" (click)="changeFilter('Undone')" [attr.aria-current]="activeFilter === 'Undone'">Undone</li>
</ul>
